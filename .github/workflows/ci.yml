name: CI

on:
  push:
    branches:
      - 'master'
      - 'release/**'
    tags:
      - 'v0.**'
  pull_request:
  workflow_dispatch:

jobs:
  # The root build installs the PUBLISHED SPI from the registry, so it cannot
  # catch breakage in adapter-contract/ sources. This job tests the in-repo
  # SPI and compiles the adapter against the locally packed artifact.
  spi:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://npm.pkg.github.com/
          scope: '@owneraio'

      - name: SPI clean-install
        working-directory: ./adapter-contract
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SPI test
        working-directory: ./adapter-contract
        run: npm test

      - name: SPI pack verification
        working-directory: ./adapter-contract
        run: |
          npm pack --json > /tmp/pack.json
          node -e "
            const files = require('/tmp/pack.json')[0].files.map(f => f.path);
            const stray = files.filter(f => !/^(dist\/|src\/|package\.json$|README\.md$)/.test(f));
            if (stray.length) { console.error('unexpected files in pack:', stray); process.exit(1); }
            console.log('pack contents OK:', files.length, 'files');
          "

      - name: Adapter clean-install
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile adapter against the locally packed SPI
        run: |
          npm install --no-save ./adapter-contract/owneraio-finp2p-ethereum-adapter-contract-*.tgz
          npx tsc --noEmit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://npm.pkg.github.com/
          scope: '@owneraio'

      - name: Install goose DB migration tool
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@v3.26.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Finp2p-Contracts npm clean-install
        working-directory: ./finp2p-contracts
        run: npm clean-install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Finp2p-Contracts npm run compile
        working-directory: ./finp2p-contracts
        run: npm run compile

      - name: Finp2p-Contracts npm run build
        working-directory: ./finp2p-contracts
        run: npm run build

      - name: Finp2p-Contracts npm run test
        working-directory: ./finp2p-contracts
        run: npm run test

      - name: Adapter npm clean-install
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Adapter npm run build
        run: npm run build

      - name: Adapter npm test
        run: npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker tags
        run: |
          set -euxo pipefail
          case $GITHUB_EVENT_NAME in
            push|workflow_dispatch)
              IMAGE_TAG=$GITHUB_REF_NAME
              ;;
            pull_request)
              IMAGE_TAG=$GITHUB_HEAD_REF
              ;;
            *)
              echo "ERROR: Unknown event"
              exit 1
              ;;
          esac
          export IMAGE_TAG=$(echo $IMAGE_TAG | sed 's/\//-/g' | sed 's/^v//')
          echo "PLATFORMS=linux/amd64" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Docker build local
        run: |
          ## local build for scanners
          docker build \
            --secret id=npm_token,env=GITHUB_TOKEN \
            -t "ghcr.io/owneraio/finp2p-ethereum-adapter:${{ env.IMAGE_TAG }}" -f ./Dockerfile .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Trivy scan
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

          ## trivy scan on local images
          trivy image "ghcr.io/owneraio/finp2p-ethereum-adapter:${{ env.IMAGE_TAG }}"
#          trivy image "ghcr.io/owneraio/hardhat:${{ env.IMAGE_TAG }}"
#          trivy image "ghcr.io/owneraio/finp2p-contracts:${{ env.IMAGE_TAG }}"

      - name: Adapter Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          sbom: false
          provenance: false
          secrets: |
            npm_token=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ownera/finp2p-ethereum-adapter:${{ env.IMAGE_TAG }}
            ghcr.io/owneraio/finp2p-ethereum-adapter:${{ env.IMAGE_TAG }}

      - name: Docker-deploy Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./finp2p-contracts
          push: true
          sbom: false
          provenance: false

          file: ./finp2p-contracts/Dockerfile-deploy
          secrets: |
            npm_token=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ghcr.io/owneraio/finp2p-contracts-deploy:${{ env.IMAGE_TAG }}
